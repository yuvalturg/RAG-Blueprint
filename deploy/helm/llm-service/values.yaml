servingRuntime:
  name: vllm-serving-runtime
  knativeTimeout: 60m
  recommendedAccelerators: '["nvidia.com/gpu"]'
  image: quay.io/ecosystem-appeng/vllm:openai-v0.8.3
  env:
  - name: HOME
    value: /vllm
  volumeMounts:
  - mountPath: /dev/shm
    name: shm
  - mountPath: /vllm
    name: vllm-home
  volumes:
  - emptyDir:
      medium: Memory
      sizeLimit: 2Gi
    name: shm
  - emptyDir:
      sizeLimit: 5Gi
    name: vllm-home

models:
  llama-3-2-3b-instruct:
    id: meta-llama/Llama-3.2-3B-Instruct
    args:
    - --enable-auto-tool-choice
    - --chat-template
    - /vllm-workspace/examples/tool_chat_template_llama3.2_json.jinja
    - --tool-call-parser
    - llama3_json
    - --max-model-len
    - "30544"
