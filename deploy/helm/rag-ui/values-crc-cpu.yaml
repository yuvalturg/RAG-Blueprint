# Default values for rag-ui.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: quay.io/yuvalturg/llamastack-dist-ui
  pullPolicy: IfNotPresent
  tag: 0.1.9

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8501

env:
  - name: LLAMA_STACK_ENDPOINT
    value: 'http://llamastack:8321'

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

global:
  models:
    inference:
      id: meta-llama/Llama-3.2-1B-Instruct
      storageUri: oci://quay.io/redhat-ai-services/modelcar-catalog:llama-3.2-1b-instruct
      serviceName: rag-inference
      args:
      - --enable-auto-tool-choice
      - --chat-template
      - /workspace/vllm/examples/tool_chat_template_llama3.2_json.jinja
      - --tool-call-parser
      - llama3_json
    safety:
      id: meta-llama/Llama-Guard-3-1B
      storageUri: oci://quay.io/yuvalturg/modelcars:llama-guard-3-1b
      serviceName: rag-safety

llm-service:
  servingRuntimeImage: public.ecr.aws/q9t5s3a7/vllm-cpu-release-repo@sha256:6b0d6af534a3c2a24fbcbd0e5e919f9f215be73fdf799a7bbd324178956cb7df
